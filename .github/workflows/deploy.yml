name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Create deployment archive
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/ || true
          cp package.json deploy/
          cp package-lock.json deploy/
          cp custom-server.js deploy/
          cp next.config.mjs deploy/
          cp jsconfig.json deploy/ || true
          cd deploy && tar -czf ../deploy.tar.gz .

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create directory if not exists
            mkdir -p ~/9router-custom

            # Extract build
            cd ~/9router-custom
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # Install production dependencies only
            npm install --production

            # Restart pm2
            pm2 restart 9router-custom || pm2 start npm --name "9router-custom" -- run start
            pm2 save

            echo "✓ Deployment complete!"
            pm2 status 9router-custom
