name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Create deployment archive
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/ || true
          cp package.json deploy/
          cp package-lock.json deploy/
          cp custom-server.js deploy/
          cp next.config.mjs deploy/
          cp jsconfig.json deploy/ || true
          cd deploy && tar -czf ../deploy.tar.gz .

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create directory if not exists
            mkdir -p ~/9router-custom

            # Extract build
            cd ~/9router-custom
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz

            # Install production dependencies only
            npm install --production

            # Create pm2 ecosystem config (match original setup)
            cat > ecosystem.config.js << 'EOF'
            module.exports = {
              apps: [{
                name: '9router-custom',
                script: 'npm',
                args: 'run start',
                cwd: '/home/${{ secrets.SERVER_USER }}/9router-custom',
                env: {
                  NODE_ENV: 'production',
                  PORT: 5000,
                  HOSTNAME: '0.0.0.0',
                },
                instances: 1,
                exec_mode: 'fork',
                autorestart: true,
                watch: false,
                max_memory_restart: '1G',
              }]
            };
            EOF

            # Restart pm2
            pm2 delete 9router-custom 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            echo "✓ Deployment complete!"
            echo "✓ Running on 0.0.0.0:5000 (same as original)"
            pm2 status 9router-custom
