name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to fork directory (create if not exists)
            if [ ! -d ~/9router-custom ]; then
              echo "Cloning fork for first time..."
              cd ~
              git clone https://github.com/fzrilsh/9router.git 9router-custom
              cd 9router-custom
              npm install
              npm run build

              # Start with pm2
              pm2 start npm --name "9router-custom" -- run start
              pm2 save
            else
              echo "Updating existing deployment..."
              cd ~/9router-custom
              git pull origin master
              npm install
              npm run build

              # Restart pm2 (or start if not running)
              pm2 restart 9router-custom || pm2 start npm --name "9router-custom" -- run start
              pm2 save
            fi

            echo "Deployment complete!"
            pm2 status 9router-custom
